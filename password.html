<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Manager</title>
    <link rel="stylesheet" href="password.css">
</head>

<body>
    <div class="container">
        <form class="passwordForm">
            <input type="text" id="website" placeholder="Website Name" required>

            <input type="text" id="username" placeholder="username/email" required>
            <input type="text" id="username" placeholder="password" required>
            <button type="submit">Save Password</button>
        </form>
        <input type="text" id="search" placeholder="Search Website...">
        <table>

            <thead>
                <tr>
                    <th>Website</th>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Actions</th>
                </tr>
            </thead>
        </table>
    </div>
</body>
<script src="password.js"></script>
</html>
