<script>
    const requestUrl = 'https://api.github.com/users/hiteshchoudhary'
    const xhr = new XMLHttpRequest();
    xhr.open('GET', requestUrl)
    xhr.onreadystatechange = function () {
        console.log(xhr.readyState);
        if (xhr.readyState === 4) {
            const data = JSON.parse(this.responseText) // parse json ko string me change  kar deta hai 

            console.log(typeof data)
            console.log(data.followers); // sirf responsetext lgayenge to nhi kaam krega but agr uske aage this. lga do to aa jayega kaam ho jayega 
        }
    }

    xhr.send()
</script>
